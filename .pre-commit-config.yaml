repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uvx ty check src/
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: python3 -m pytest
        language: system
        pass_filenames: false
        always_run: true
